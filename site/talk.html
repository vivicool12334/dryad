<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Talk to Dryad</title>
    <meta name="description" content="Ask Dryad about Detroit's lakeplain ecology, the autonomous loop, native species, or how to get a lot from the Detroit Land Bank.">
    <meta name="theme-color" content="#1A1C14">
    <meta property="og:title" content="Talk to Dryad - The Forest That Owns Itself">
    <meta property="og:description" content="Ask Dryad about Detroit's lakeplain ecology and how an autonomous AI agent stewards land.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23E29E4B' d='M12 2C10.5 2 9 3.5 9 5C9 6.5 10.5 8 12 8C13.5 8 15 6.5 15 5C15 3.5 13.5 2 12 2ZM6 10C4.5 10 3 11.5 3 13C3 14.5 4.5 16 6 16C7.5 16 9 14.5 9 13C9 11.5 7.5 10 6 10ZM18 10C16.5 10 15 11.5 15 13C15 14.5 16.5 16 18 16C19.5 16 21 14.5 21 13C21 11.5 19.5 10 18 10ZM12 16C10.5 16 9 17.5 9 19C9 20.5 10.5 22 12 22C13.5 22 15 20.5 15 19C15 17.5 13.5 16 12 16Z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1A1C14;
            --bg-alt: #22241A;
            --text-main: #D2D6C1;
            --text-body: #c8ccb8;
            --text-muted: rgba(210, 214, 193, 0.55);
            --accent: #8DA667;
            --accent-light: #a8c47a;
            --accent-amber: #E29E4B;
            --card-bg: #22241A;
            --card-border: rgba(141, 166, 103, 0.2);
            --font-display: 'Instrument Serif', serif;
            --font-mono: 'Space Mono', monospace;
            --font-body: 'Manrope', system-ui, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text-body);
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        ::selection { background: var(--accent-amber); color: var(--bg); }

        /* ── HEADER ── */
        .talk-hdr {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--card-border);
            background: var(--bg);
            flex-shrink: 0;
            min-height: 56px;
        }
        .talk-hdr-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.4rem;
            transition: background 0.15s, color 0.15s;
        }
        .talk-hdr-back:active, .talk-hdr-back:hover { background: var(--card-bg); color: var(--accent); }
        .talk-hdr-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px rgba(141, 166, 103, 0.5);
            animation: dot-pulse 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes dot-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .talk-hdr-text { flex: 1; min-width: 0; }
        .talk-hdr-text strong {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: 1.4rem;
            color: var(--accent-amber);
            display: block;
            line-height: 1.1;
        }
        .talk-hdr-text span {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .talk-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 5px 9px;
            border-radius: 4px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .talk-status-badge.live { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .talk-status-badge.offline { background: rgba(255, 152, 0, 0.25); color: #FFB74D; }
        .talk-status-badge::before { content: '●'; font-size: 0.8rem; }
        .talk-status-badge.live::before { animation: dot-pulse 1.5s ease-in-out infinite; }

        /* ── MESSAGES ── */
        #talk-messages {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #talk-messages::-webkit-scrollbar { width: 4px; }
        #talk-messages::-webkit-scrollbar-track { background: transparent; }
        #talk-messages::-webkit-scrollbar-thumb { background: rgba(141, 166, 103, 0.18); border-radius: 2px; }

        .talk-welcome {
            text-align: center;
            padding: 24px 8px;
            margin: auto 0;
        }
        .talk-welcome-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            fill: var(--accent-amber);
            opacity: 0.85;
            animation: welcome-spin 30s linear infinite;
        }
        @keyframes welcome-spin { to { transform: rotate(360deg); } }
        .talk-welcome h3 {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: 1.9rem;
            color: var(--accent-amber);
            margin-bottom: 12px;
            line-height: 1.15;
        }
        .talk-welcome p {
            color: var(--text-muted);
            max-width: 320px;
            margin: 0 auto;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .talk-msg {
            max-width: 88%;
            padding: 11px 15px;
            border-radius: 14px;
            line-height: 1.5;
            font-size: 1rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .talk-msg.user {
            background: var(--accent);
            color: var(--bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .talk-msg.agent {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .talk-msg.typing {
            color: var(--text-muted);
            font-style: italic;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }
        .talk-msg.agent a { color: var(--accent-light); text-decoration: underline; }

        /* ── SUGGESTIONS ── */
        .talk-suggestions {
            display: flex;
            gap: 8px;
            padding: 0 16px 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .talk-suggestions::-webkit-scrollbar { display: none; }
        .talk-chip {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-body);
            padding: 9px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-family: var(--font-body);
            cursor: pointer;
            white-space: nowrap;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
            flex-shrink: 0;
        }
        .talk-chip:active, .talk-chip:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: rgba(141, 166, 103, 0.08);
        }

        /* ── INPUT ── */
        .talk-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--card-border);
            background: var(--bg);
            flex-shrink: 0;
        }
        #talk-input {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            padding: 12px 18px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 16px; /* prevents iOS zoom */
            line-height: 1.4;
            outline: none;
            min-height: 44px;
            transition: border-color 0.15s;
        }
        #talk-input:focus { border-color: var(--accent); }
        #talk-input::placeholder { color: var(--text-muted); }
        #talk-send {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 22px;
            padding: 0 20px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            min-height: 44px;
            min-width: 64px;
            transition: background 0.15s, opacity 0.15s;
        }
        #talk-send:active { background: var(--accent-light); }
        #talk-send:disabled { opacity: 0.4; cursor: not-allowed; }

        .talk-footer {
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            padding: 8px 16px 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ── DESKTOP REFINEMENT ── */
        @media (min-width: 768px) {
            body { max-width: 640px; margin: 0 auto; border-left: 1px solid var(--card-border); border-right: 1px solid var(--card-border); }
            .talk-msg { font-size: 1.02rem; }
            .talk-welcome h3 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <header class="talk-hdr">
        <a href="/" class="talk-hdr-back" aria-label="Back to dryad.land">←</a>
        <div class="talk-hdr-dot" aria-hidden="true"></div>
        <div class="talk-hdr-text">
            <strong>Ask Dryad</strong>
            <span>Autonomous Agent</span>
        </div>
        <div class="talk-status-badge live" id="talk-status" aria-live="polite">LIVE</div>
    </header>

    <div id="talk-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <div class="talk-suggestions" id="talk-suggestions" role="list"></div>

    <form class="talk-input-area" id="talk-form">
        <input id="talk-input" type="text" placeholder="Ask about the land, ecology, DLBA..." aria-label="Type a message to Dryad" autocomplete="off">
        <button id="talk-send" type="submit" aria-label="Send message">Send</button>
    </form>

    <div class="talk-footer">dryadforest.eth · ERC-8004 #35293 · elizaOS</div>

<script>
(function(){
var AGENT_HOST = 'https://dashboard.dryad.land';
var AGENT_API = AGENT_HOST + '/api/chat';
var AGENT_TOKEN = '302922b3a1ca99f87e43b2e046129da15f1ea9cb3a1cbb5c687343ffced42617';
var useKB = false;
var chatHistory = [];

var allSuggestions = [
    "What is Dryad?",
    "How do I get a lot from DLBA?",
    "What plants are native here?",
    "Tell me about Chadsey-Condon",
    "How does the treasury work?",
    "What invasives are in Detroit?",
    "How can I help?",
    "Show me the smart contracts",
];
var sugIdx = 0;

var kb = [
    {k:['what is dryad','about dryad','the project','what does dryad do'],r:"Dryad is an autonomous AI agent managing 9 vacant lots on 25th Street in Detroit's Chadsey-Condon neighborhood. Registered onchain as ERC-8004 Agent #35293 on Base.\n\nIt monitors ecological health through iNaturalist, manages a USDC treasury earning ~4% APY via cross-chain DeFi yield (Morpho and Aave V3 on Base and Arbitrum), detects invasive species, schedules native plantings, and pays property taxes - all autonomously."},
    {k:['how does it work','technology','tech stack','architecture'],r:"Dryad runs on elizaOS. The stack:\n• Chain: Base mainnet (Ethereum L2)\n• Treasury: USDC earning cross-chain yield (~4% APY via Morpho + Aave on Base and Arbitrum)\n• Milestones: DryadMilestones.sol (0x7572...)\n• Identity: ERC-8004 #35293, dryadforest.eth\n• Monitoring: iNaturalist API\n• Inference: Venice.ai (GLM 4.7 Flash)"},
    {k:['cost','budget','money','treasury','financial','how much'],r:"Total funding needed: ~$41,000\n• $13.5K setup (land, mastication, seeds)\n• $2.9K establishment (years 1-2 mowing)\n• $23.6K USDC treasury for perpetual yield\n• $1K buffer\n\n$23,625 at ~4% APY = $945/yr (cross-chain yield via Morpho + Aave on Base and Arbitrum)\nYear 3+ operating cost: ~$105/lot/yr (cheaper than city mowing)"},
    {k:['native','plants','species','flora','what grows','chadsey'],r:"Detroit is lakeplain. Native communities:\n\nLAKEPLAIN OAK OPENINGS:\nBur oak, swamp white oak, big bluestem, Indian grass, wild bergamot\n\nLAKEPLAIN WET PRAIRIE:\nCord grass, swamp milkweed, mountain mint, blazing star\n\nDryad's plan: 300 saplings + Prairie Moon seed mix, 25+ species"},
    {k:['invasive','weed','phragmites','buckthorn','ailanthus','removal'],r:"3-tier MNFI priority:\n\nTIER 1 - REMOVE:\nCommon/glossy buckthorn, autumn olive, Amur honeysuckle, multiflora rose, Oriental bittersweet\n\nTIER 2 - MANAGE:\nNon-native Phragmites, reed canary grass, purple loosestrife\n\nIMPORTANT: Native Phragmites (subsp. americanus) has reddish stems - leave it!"},
    {k:['land bank','dlba','buy a lot','acquire'],r:"DLBA programs (buildingdetroit.org):\n\nSIDE LOT: $100-200, must own adjacent home\nOWN IT NOW: Open to anyone\nAUCTION: Periodic, low starting bids\n\nCREATE-A-PROJECT: $250/lot for LLC/501(c)3\n• LBP@detroitmi.gov\n• Office hours: 1st Thursday/month, 12-1pm"},
    {k:['blockchain','base','contract','nft','erc','onchain','arbitrum'],r:"Dryad on Base mainnet:\n• Attestations: EAS on Base\n• Treasury: USDC earning cross-chain yield (Morpho + Aave on Base and Arbitrum)\n• DryadMilestones.sol: 0x7572dcac...bc22\n• ERC-8004 Agent #35293\n• Wallet: 0xf2f7527D...0880\n• ENS: dryadforest.eth\n\nEvery verified contractor job and research-grade iNaturalist observation gets attested onchain via EAS."},
    {k:['attestation','eas','attest','proof of impact','hypercert','refi'],r:"Dryad mints onchain attestations on Base via the Ethereum Attestation Service (EAS):\n\n1. WORK ATTESTATIONS: When a contractor's photos pass vision verification, an attestation records their work permanently - contractor, work type, parcel, photo hash, vision score.\n\n2. OBSERVATION ATTESTATIONS: Research-grade iNaturalist observations get attested with species, observer, GPS, and invasive status.\n\nThese create composable, verifiable proof of ecological impact. View them at base.easscan.org.\n\nFuture: attestations can be bundled into Hypercerts for retroactive public goods funding."},
    {k:['governance','vote','airdrop','dao','neighbor','community'],r:"V2 governance:\n\nPROXIMITY AIRDROP: Free soulbound NFTs to residents within 500 ft\nPARTICIPATION: Earn NFTs via iNaturalist observations\n1 NFT = 1 vote. Non-transferable.\n\nSnapshot DAO: Vote on planting plans, contractor selection\nThe forest belongs to its neighbors, not investors."},
    {k:['inaturalist','inat','observation','biodiversity'],r:"iNaturalist: inaturalist.org/projects/dryad-25th-street-parcels-mapping\n\nHow to contribute:\n1. Download iNaturalist app (free)\n2. Visit the lots at 25th St between Ash & Beech\n3. Photograph any living thing\n4. Upload - AI identifies the species\n\nEvery observation feeds Dryad's health score. Research-grade observations (community-verified species ID) get attested onchain via EAS on Base - permanent biodiversity records."},
    {k:['environment','carbon','footprint','energy','emissions','climate'],r:"Dryad uses 10.8-18 kWh/year (~10-17 minutes of highway driving). The habitat we restore sequesters 64-240x more carbon.\n\nThe habitat pays back the entire annual carbon footprint in 1-3 days of growing season.\n\nWe don't pretend the AI industry doesn't have real environmental costs. But Dryad doesn't train models - it makes API calls. The marginal cost is negligible."},
    {k:['submit','photo','upload','contribute','help','volunteer'],r:"Ways to get involved:\n\n1. SUBMIT OBSERVATIONS: Visit 25th St & photograph plants/animals. Upload to iNaturalist\n2. REPORT ISSUES: Spotted illegal dumping or damaged fencing?\n3. VOLUNTEER: Spring knotweed removal & fall seed collection\n4. SPREAD THE WORD: Share the project with neighbors\n\nEvery iNaturalist observation feeds Dryad's ecological health score"},
    {k:['hello','hi','hey'],r:"Hello! I'm Dryad - an autonomous agent managing 9 lots in Detroit.\n\nI can tell you about:\n• The project & how it works\n• Detroit's vacant land crisis\n• Native ecology & invasive species\n• Blockchain & governance\n• How to get involved\n\nWhat would you like to know?"}
];

function match(input) {
    var l = input.toLowerCase(), best = null, bestS = 0;
    for (var i = 0; i < kb.length; i++) {
        var s = 0;
        for (var j = 0; j < kb[i].k.length; j++) {
            if (l.indexOf(kb[i].k[j]) >= 0) s += kb[i].k[j].split(' ').length;
        }
        if (s > bestS) { bestS = s; best = kb[i]; }
    }
    return best && bestS > 0 ? best.r : "I can help with:\n• The Dryad project\n• Detroit vacant land & DLBA\n• Native plants & ecology\n• Invasive species\n• Blockchain & governance\n• How to get involved\n\nTry asking about one of these.";
}

function renderMsg(text) {
    var tmp = document.createElement('div');
    tmp.textContent = text;
    var safe = tmp.innerHTML;
    safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    safe = safe.replace(/\*(.+?)\*/g, '<em>$1</em>');
    safe = safe.replace(/(https?:\/\/[^\s<"']+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
    safe = safe.replace(/\n/g, '<br>');
    return safe;
}

function addMsg(role, text, isTyping) {
    var el = document.getElementById('talk-messages');
    var d = document.createElement('div');
    d.className = 'talk-msg ' + role + (isTyping ? ' typing' : '');
    if (isTyping || role === 'user') {
        d.textContent = text;
    } else {
        d.innerHTML = renderMsg(text);
    }
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
    return d;
}

function updateStatusBadge() {
    var badge = document.getElementById('talk-status');
    if (useKB) {
        badge.textContent = 'OFFLINE';
        badge.className = 'talk-status-badge offline';
    } else {
        badge.textContent = 'LIVE';
        badge.className = 'talk-status-badge live';
    }
}

function showSuggestions() {
    var sug = document.getElementById('talk-suggestions');
    sug.innerHTML = '';
    var slice = [];
    for (var i = 0; i < 4; i++) {
        slice.push(allSuggestions[(sugIdx + i) % allSuggestions.length]);
    }
    slice.forEach(function(s) {
        var b = document.createElement('button');
        b.className = 'talk-chip';
        b.textContent = s;
        b.type = 'button';
        b.onclick = function() { send(s); };
        sug.appendChild(b);
    });
}

async function send(text) {
    var w = document.getElementById('talk-welcome');
    if (w) w.remove();
    addMsg('user', text);
    chatHistory.push({ role: 'user', content: text });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    sugIdx = (sugIdx + 4) % allSuggestions.length;
    showSuggestions();

    var typing = addMsg('agent', 'Dryad is thinking...', true);
    var resp;
    if (!useKB) {
        try {
            var r = await fetch(AGENT_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-KEY': AGENT_TOKEN },
                body: JSON.stringify({ text: text, history: chatHistory.slice(0, -1) }),
                signal: AbortSignal.timeout(15000),
            });
            if (!r.ok) throw 0;
            var data = await r.json();
            resp = data.text;
        } catch (e) {
            useKB = true;
            updateStatusBadge();
            resp = match(text);
        }
    } else {
        resp = match(text);
        await new Promise(function(r) { setTimeout(r, Math.min(800 + resp.length * 3, 2500)); });
    }
    typing.remove();
    resp = resp || match(text);
    addMsg('agent', resp);
    chatHistory.push({ role: 'assistant', content: resp });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
}

function init() {
    var el = document.getElementById('talk-messages');
    var welcome = document.createElement('div');
    welcome.className = 'talk-welcome';
    welcome.id = 'talk-welcome';
    welcome.innerHTML = '<svg class="talk-welcome-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C10.5 2 9 3.5 9 5C9 6.5 10.5 8 12 8C13.5 8 15 6.5 15 5C15 3.5 13.5 2 12 2ZM6 10C4.5 10 3 11.5 3 13C3 14.5 4.5 16 6 16C7.5 16 9 14.5 9 13C9 11.5 7.5 10 6 10ZM18 10C16.5 10 15 11.5 15 13C15 14.5 16.5 16 18 16C19.5 16 21 14.5 21 13C21 11.5 19.5 10 18 10ZM12 16C10.5 16 9 17.5 9 19C9 20.5 10.5 22 12 22C13.5 22 15 20.5 15 19C15 17.5 13.5 16 12 16Z"/></svg>';
    var h3 = document.createElement('h3');
    h3.textContent = 'Talk to the Forest';
    welcome.appendChild(h3);
    var p = document.createElement('p');
    p.textContent = 'Ask about the ecology, how to get a lot from Detroit Land Bank, native species, or how autonomous conservation works.';
    welcome.appendChild(p);
    el.appendChild(welcome);

    showSuggestions();

    var form = document.getElementById('talk-form');
    var input = document.getElementById('talk-input');
    form.onsubmit = function(e) {
        e.preventDefault();
        var v = input.value.trim();
        if (v) {
            send(v);
            input.value = '';
            input.blur();
        }
    };
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
})();
</script>
</body>
</html>
